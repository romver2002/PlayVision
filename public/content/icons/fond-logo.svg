<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="russianFlag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="33%" style="stop-color:#FFFFFF"/>
      <stop offset="33%" style="stop-color:#0039A6"/>
      <stop offset="66%" style="stop-color:#0039A6"/>
      <stop offset="66%" style="stop-color:#D52B1E"/>
      <stop offset="100%" style="stop-color:#D52B1E"/>
    </linearGradient>
  </defs>

  <!-- Background stripe with Russian colors -->
  <path d="M0,85 Q100,70 200,80 T400,75 L400,120 Q200,110 0,120 Z" fill="#FFFFFF"/>
  <path d="M0,90 Q100,78 200,85 T400,82 L400,105 Q200,100 0,108 Z" fill="#0099FF"/>
  <path d="M0,100 Q100,92 200,98 T400,95 L400,120 Q200,115 0,120 Z" fill="#D52B1E"/>

  <!-- Number 25 -->
  <text x="10" y="60" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#1a3a5c">25</text>

  <!-- ФОНД СОДЕЙСТВИЯ -->
  <text x="85" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a3a5c" letter-spacing="2">ФОНД СОДЕЙСТВИЯ</text>

  <!-- ИННОВАЦИЯМ -->
  <text x="85" y="60" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a3a5c" letter-spacing="2">ИННОВАЦИЯМ</text>
</svg>
